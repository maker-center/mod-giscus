{{- $params := .Site.Params.comments -}}
{{- with $params -}}
<h2>{{ T "comments" }}</h2>

<script id="giscus-script" src="https://giscus.app/client.js"
    data-repo="{{ $params.dataRepo }}"
    data-repo-id="{{ $params.dataRepoID }}"
    data-category="{{ $params.dataCategory }}"
    data-category-id="{{ $params.dataCategoryID }}"
    data-mapping="{{ $params.dataMapping }}"
    data-strict="{{ $params.dataStrict }}"
    data-reactions-enabled="{{ $params.dataReactionsEnabled }}"
    data-emit-metadata="{{ $params.dataEmitMetadata }}"
    data-input-position="{{ $params.dataInputPosition }}"
    data-theme="{{ default "light" $params.dataTheme }}"
    data-lang="{{ $params.dataLang }}"
    crossorigin="anonymous"
    async>
</script>
{{- end -}}
